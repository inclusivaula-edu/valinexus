server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Compressão gzip ──────────────────────────────────────────────────────
    # Reduz JS/CSS em ~70% — melhora tempo de carregamento significativamente
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Cache agressivo para assets com hash ─────────────────────────────────
    # Vite gera nomes como "index-Bx2kP9aL.js" — o hash muda quando o conteúdo
    # muda. Então podemos cachear por 1 ano com segurança.
    location ~* \.(js|css|woff2|woff|ttf|ico|png|jpg|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    # O React Router gerencia as rotas no cliente. Qualquer URL que não seja
    # um arquivo estático deve retornar index.html para o React processar.
    # Sem isso, /dashboard ao dar F5 retornaria 404 do nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Headers de segurança ─────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Logs ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}
